AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to provision an EC2 instance

Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-084568db4383264d4 # Replace with a valid AMI ID for your region
      KeyName: instanceKey # Replace with your key pair name
      SecurityGroupIds:
        - sg-0958c1dbd7f45dc40
      Tags:
        - Key: Name
          Value: default

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0 # Replace with a more restrictive IP range for better security